<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Voz Cidadã - Denúncias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="font-bold text-xl text-blue-600">Voz Cidadã</h1>
        <div class="flex gap-4">
            <button onclick="showView('home')" class="hover:text-blue-600 font-medium">Início</button>
            <button onclick="showView('track')" class="hover:text-blue-600 font-medium">Consultar</button>
            <button onclick="showView('admin')" class="bg-slate-800 text-white px-4 py-2 rounded-lg font-bold">Admin</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <section id="view-home" class="view-section text-center py-20">
            <h2 class="text-4xl font-black mb-6">Denúncia Anônima</h2>
            <button onclick="startReport()" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold shadow-lg">Nova Denúncia</button>
        </section>

        <section id="view-report" class="view-section hidden bg-white p-8 rounded-3xl shadow-xl">
            <div id="step-1" class="step-content">
                <h3 class="text-xl font-bold mb-6">1. Escolha a Categoria</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="selectCat('Segurança', this)" class="cat-btn border-2 p-4 rounded-xl text-left hover:border-blue-500">Segurança e Violência</button>
                    <button onclick="selectCat('Direitos', this)" class="cat-btn border-2 p-4 rounded-xl text-left hover:border-blue-500">Direitos e Conduta</button>
                    <button onclick="selectCat('Ambiental', this)" class="cat-btn border-2 p-4 rounded-xl text-left hover:border-blue-500">Meio Ambiente</button>
                    <button onclick="selectCat('Serviços', this)" class="cat-btn border-2 p-4 rounded-xl text-left hover:border-blue-500">Cidade e Serviços</button>
                </div>
                <button id="next-1" disabled onclick="nextStep(2)" class="mt-8 w-full bg-slate-200 text-slate-400 py-3 rounded-xl font-bold">Próximo</button>
            </div>

            <div id="step-2" class="step-content hidden">
                <h3 class="text-xl font-bold mb-6">2. Detalhes</h3>
                <input type="text" id="in-bairro" placeholder="Bairro" class="w-full p-3 border rounded-xl mb-4">
                <input type="text" id="in-rua" placeholder="Rua" class="w-full p-3 border rounded-xl mb-4">
                <textarea id="in-relato" placeholder="Descrição" class="w-full p-3 border rounded-xl mb-4" rows="4"></textarea>
                <button onclick="finishReport()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Finalizar Denúncia</button>
            </div>
        </section>

        <section id="view-admin" class="view-section hidden">
            <div class="bg-white p-6 rounded-3xl shadow-xl">
                <h2 class="text-2xl font-bold mb-6">Painel do Administrador</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b text-slate-400 text-sm">
                                <th class="p-2">Protocolo</th>
                                <th class="p-2">Bairro</th>
                                <th class="p-2">Status</th>
                                <th class="p-2 text-right">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-track" class="view-section hidden">
            <div class="bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-2xl font-bold mb-4">Acompanhar</h2>
                <input type="text" id="track-in" placeholder="Protocolo" class="w-full p-3 border rounded-xl mb-4">
                <button onclick="track()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Pesquisar</button>
                <div id="track-res" class="mt-6 p-4 bg-blue-50 rounded-xl hidden">
                    <p class="font-bold">Status: <span id="res-status" class="text-blue-600 uppercase"></span></p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
